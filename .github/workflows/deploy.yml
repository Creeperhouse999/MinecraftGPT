name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Build mod
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Upload to Falix via SFTP
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.FALIX_PASS }}" sftp -o StrictHostKeyChecking=no -P ${{ secrets.FALIX_PORT }} ${{ secrets.FALIX_USER }}@${{ secrets.FALIX_HOST }} <<EOF
          put build/libs/coppergolem-*.jar /mods/
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: build/libs/coppergolem-*.jar
          make_latest: true
